<!-- Destek Ol Formu (Güncellenmiş) -->
<div id="destekForm" class="popup-form" style="display:block; text-align:center; font-family:Arial, sans-serif;">
  <div class="popup-icerik" style="display:inline-block; text-align:left; background:#f9f9f9; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); max-width:500px; width:100%;">
    <span class="kapat" onclick="this.parentElement.parentElement.style.display='none';" style="float:right; font-size:24px; cursor:pointer; color:#aaa;">&times;</span>
    <h2 style="color:#006d77; text-align:center;">Destek Ol</h2>
    <form action="https://formspree.io/f/mgvglwbz" method="POST">
      <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
      <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
      <input type="tel" name="telefon" placeholder="Telefon" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">

      <select name="destek_turu" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Destek Türü</option>
        <option>Finansal Destek</option>
        <option>Malzeme Bağışı</option>
        <option>Zaman / Gönüllülük</option>
        <option>Eğitim Desteği</option>
        <option>Ulaşım Desteği</option>
        <option>Konaklama Desteği</option>
        <option>Kahvaltı / Yemek Desteği</option>
        <option>Burs Desteği</option>
        <option>Diğer</option>
      </select>

      <textarea name="mesaj" placeholder="Nasıl destek olmak istersiniz? (Detay yazın)" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; height:80px;"></textarea>
      
      <button type="submit" style="background:#006d77; color:white; padding:12px 20px; border:none; border-radius:4px; cursor:pointer; width:100%; font-size:16px;">Gönder</button>
    </form>
  </div>
</div>
