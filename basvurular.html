                <input type="hidden" name="form_tipi" value="Gönüllü Öğretmen">

                <input type="tel" name="telefon" placeholder="Telefon Numarası *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">

                <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                <input type="tel" name="telefon" placeholder="Telefon *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                <input type="email" name="email" placeholder="E-posta *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                <input type="text" name="meslek" placeholder="Meslek / Unvan *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                
                <select name="ilgi" required style="width:100%;padding:10px;margin:8px 0;">
                    <option value="">İlgi Alanı Seçiniz *</option>
                    <option>Eğitim</option><option>Sosyal Yardım</option><option>Çevre</option><option>Diğer</option>
                </select>
                
                <textarea name="mesaj" placeholder="Neden gönüllü olmak istiyorsunuz?" style="width:100%;padding:10px;margin:8px 0;height:100px;box-sizing:border-box;"></textarea>
                
                <button type="submit" style="width:100%;padding:14px;background:#9b59b6;color:white;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;">Başvuruyu Gönder</button>

        </div>

        <div id="destek" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
            <form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">
                <h2 style="color:#006d77; text-align:center; margin-bottom:20px;">Destek Ol</h2>
                <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                <input type="email" name="email" placeholder="E-posta *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
                
                <select name="odeme_yontemi" onchange="toggleIban(this.value)" required style="width:100%;padding:10px;margin:12px 0;">
                    <option value="">Ödeme Yöntemi Seçiniz *</option>
                    <option value="EFT_Havale">EFT / Havale</option>
                    <option value="Elden">Elden Ödeme</option>
                </select>

                <div id="ibanAlani" style="display:none; background:#f8f9fa; padding:15px; border-radius:8px; margin:15px 0; border:1px solid #ddd;">
                    <p style="margin:0 0 5px 0; font-weight:bold; color:#006d77;">Dernek IBAN:</p>
                    <input type="text" value="TR00 0000 0000 0000 0000 0000 00" readonly style="width:100%; padding:10px; background:#e0f7fa; border:1px solid #aaa; border-radius:6px; font-family:monospace;">
                </div>

<script>
// Tab değiştirme fonksiyonu
function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = "none");
    document.getElementById(tabName).style.display = "block";
}

// Burs formunu aç/kapat
function toggleBursForm(checkbox) {
    document.getElementById("bursFormContainer").style.display = checkbox.checked ? "block" : "none";
}

// IBAN alanını aç/kapat
function toggleIban(val) {
    document.getElementById("ibanAlani").style.display = (val === "EFT_Havale") ? "block" : "none";
}

// AJAX ile form gönderimi (Formspree uyumlu)
function sendForm(e) {
    e.preventDefault();
    const form = e.target;
    const button = form.querySelector('button[type="submit"]');
    const successMsg = document.getElementById("successMessage");

    button.disabled = true;
    button.innerText = "Gönderiliyor...";

    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
    }).then(response => {
        if (response.ok) {
            successMsg.style.display = "block";
            form.reset();
            if(document.getElementById("bursFormContainer")) document.getElementById("bursFormContainer").style.display = "none";
            if(document.getElementById("ibanAlani")) document.getElementById("ibanAlani").style.display = "none";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            alert("Bir hata oluştu, lütfen tekrar deneyin.");
        }
    }).catch(error => {
        console.error("Hata:", error);
    }).finally(() => {
        button.disabled = false;
        button.innerText = "Başvuruyu Gönder";
    });
}
</script>
