<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bize Katıl - Eserkon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f0f8ff; color: #333; line-height: 1.6; }
    .container { max-width: 900px; margin: 20px auto; padding: 20px; }
    h1 { text-align: center; color: #006d77; margin-bottom: 10px; font-size: 28px; }
    p.intro { text-align: center; color: #555; margin-bottom: 30px; font-size: 16px; }

    .tabs { 
      display: flex; 
      justify-content: center; 
      gap: 12px; 
      flex-wrap: wrap; 
      margin-bottom: 25px; 
    }
    .tab-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      background: #e0f7fa;
      color: #006d77;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn:hover, .tab-btn.active {
      background: #006d77;
      color: white;
      transform: translateY(-2px);
    }

    .tab-content {
      display: none;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-top: 10px;
      border: 1px solid #e0f7fa;
    }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 16px; }
    input, select, textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15.5px;
    }
    button.btn {
      background: #006d77;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 8px;
      width: 100%;
      font-size: 16.5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    button.btn:hover { background: #005f66; }

    /* Teşekkür Mesajı */
    #thankYouMessage {
      display: none;
      background: linear-gradient(135deg, #00c853, #009624);
      color: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      margin: 20px 0;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✨ Bize Katıl</h1>
  <p class="intro">Aşağıdaki sekmelerden başvuru türünü seçin.</p>

  <div id="successMessage" style="display:none; background:#00c853; color:white; padding:16px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:20px;">
    ✅ Mesajınız başarıyla iletildi!
  </div>

  <div id="thankYouMessage">
    ❤️ Desteğiniz için çok teşekkür ederiz!<br>
    <span style="font-size:16px; opacity:0.95;">Yaptığınız katkı, ihtiyaç sahibi öğrencilerimize umut olacak.</span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('ogretmen')">🧑‍🏫 Gönüllü Öğretmen</button>
    <button class="tab-btn" onclick="openTab('ogrenci')">🎓 Öğrenci & Burs</button>
    <button class="tab-btn" onclick="openTab('gonullu')">🤝 Gönüllü Üye</button>
    <button class="tab-btn" onclick="openTab('destek')">💖 Destek Ol</button>
  </div>

  <!-- ====================== GÖNÜLLÜ ÖĞRETMEN ====================== -->
  <div id="ogretmen" class="tab-content active">
    <form onsubmit="sendForm(event, 'ogretmen')">
      <input type="hidden" name="form_type" value="Gönüllü Öğretmen">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="sehir" placeholder="Şehir *" required></div>
      
      <div class="form-group">
        <select name="brans" required>
          <option value="">Branş Seçiniz *</option>
          <option>Matematik</option><option>Türkçe</option><option>İngilizce</option>
          <option>Fen Bilimleri</option><option>Sosyal Bilgiler</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-group">
        <select name="seviye" required>
          <option value="">Seviye Seçiniz *</option>
          <option>İlkokul</option><option>Ortaokul</option><option>Lise</option><option>Üniversite</option>
        </select>
      </div>
      <div class="form-group"><textarea name="mesaj" placeholder="Kendinizi tanıtın ve neden gönüllü öğretmen olmak istediğinizi yazınız..." required></textarea></div>
      <button type="submit" class="btn">Başvuruyu Gönder</button>
    </form>
  </div>

  <!-- ====================== ÖĞRENCİ ====================== -->
  <div id="ogrenci" class="tab-content">
    <form onsubmit="sendForm(event, 'ogrenci')">
      <input type="hidden" name="form_type" value="Öğrenci ve Burs">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="okul_adi" placeholder="Okul / Üniversite Adı *" required></div>
      <div class="form-group"><input type="text" name="bolum" placeholder="Bölüm / Sınıf"></div>

      <div style="margin: 20px 0; padding: 15px; background: #e0f2f1; border-radius: 8px;">
        <label style="cursor:pointer; display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="bursIste" onchange="toggleBurs()" style="width: 20px; height: 20px;">
          <strong>Maddi Burs Başvurusunda Bulunmak İstiyorum</strong>
        </label>
      </div>

      <div id="bursKisim" style="display: none;">
        <!-- Burs alanları buraya gelebilir -->
        <textarea name="burs_notu" placeholder="Burs ile ilgili ek açıklamalar..." style="height:120px;"></textarea>
      </div>

      <button type="submit" class="btn">Başvuruyu Tamamla</button>
    </form>
  </div>

  <!-- ====================== GÖNÜLLÜ ÜYE ====================== -->
  <div id="gonullu" class="tab-content">
    <form onsubmit="sendForm(event, 'gonullu')">
      <input type="hidden" name="form_type" value="Gönüllü Üye">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="meslek" placeholder="Meslek *" required></div>
      <div class="form-group">
        <select name="ilgi" required>
          <option value="">İlgi Alanı *</option>
          <option>Eğitim</option><option>Sosyal Yardım</option><option>Çevre</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-group"><textarea name="mesaj" placeholder="Neden katılmak istiyorsunuz?" required></textarea></div>
      <button type="submit" class="btn">Başvuruyu Gönder</button>
    </form>
  </div>

  <!-- ====================== DESTEK OL (İstenen Özellikler Eklendi) ====================== -->
  <div id="destek" class="tab-content">
    <form onsubmit="sendForm(event, 'destek')">
      <input type="hidden" name="form_type" value="Destek">

      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon (isteğe bağlı)"></div>

      <!-- Destek Miktarı -->
      <div class="form-group">
        <label style="font-weight:600;">Destek Miktarı (TL)</label>
        <input type="number" name="destek_miktari" placeholder="Örn: 500" min="1" step="1" style="font-size:17px;">
      </div>

      <div class="form-group">
        <label>Ödeme Yöntemi</label>
        <select name="odeme" onchange="toggleIBAN(this.value)" required>
          <option value="">Seçiniz</option>
          <option value="iban">IBAN / EFT (Banka Transferi)</option>
          <option value="elden">Elden Nakit</option>
        </select>
      </div>

      <div id="ibanBilgi" style="display:none; padding:15px; background:#e0f7fa; border-radius:8px; margin:10px 0;">
        <p><strong>IBAN:</strong> TR00 0000 0000 0000 0000 0000 00</p>
        <small>Lütfen açıklama kısmına adınızı yazın.</small>
      </div>

      <div class="form-group"><textarea name="mesaj" placeholder="Destekle ilgili notlarınız veya sorularınız"></textarea></div>

      <button type="submit" class="btn">Destek Talebini Gönder</button>
    </form>
  </div>
</div>

<script>
  function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
  }

  function toggleBurs() {
    const burs = document.getElementById('bursKisim');
    burs.style.display = document.getElementById('bursIste').checked ? 'block' : 'none';
  }

  function toggleIBAN(val) {
    document.getElementById('ibanBilgi').style.display = val === 'iban' ? 'block' : 'none';
  }

  function sendForm(e, tab) {
    e.preventDefault();
    const form = e.target;
    const submitBtn = form.querySelector('button');
    submitBtn.innerText = "Gönderiliyor...";
    submitBtn.disabled = true;

    fetch('https://formspree.io/f/mgvglwbz', {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(r => {
      if (r.ok) {
        form.reset();
        
        if (tab === 'destek') {
          document.getElementById('thankYouMessage').style.display = 'block';
          setTimeout(() => document.getElementById('thankYouMessage').style.display = 'none', 7000);
        } else {
          document.getElementById('successMessage').style.display = 'block';
          setTimeout(() => document.getElementById('successMessage').style.display = 'none', 6000);
        }
        
        window.scrollTo({top: 0, behavior: 'smooth'});
      }
    }).catch(() => alert('Hata oluştu. Lütfen tekrar deneyin.'))
      .finally(() => {
        submitBtn.innerText = "Gönderildi ✅";
        setTimeout(() => { 
          submitBtn.innerText = tab === 'destek' ? "Destek Talebini Gönder" : "Başvuruyu Gönder"; 
          submitBtn.disabled = false; 
        }, 2500);
      });
  }
</script>

<a href="./index.html" style="position:fixed;bottom:20px;right:20px;background:#006d77;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.2); font-weight: bold; z-index: 1000;">🏠 Ana Sayfaya Dön</a>
</body>
</html>
