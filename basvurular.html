<!-- SADECE DÜZELTİLEN KRİTİK KISIM GÖSTERİLİYOR -->

<!-- ====================== ÖĞRENCİ ====================== -->
<div id="ogrenci" class="tab-content">
  <div class="form-header">
    <img src="https://source.unsplash.com/800x400/?university,student">
    <h2>Öğrenci Kayıt ve Burs Formu</h2>
  </div>

  <form onsubmit="sendForm(event, 'ogrenci')">
    <input type="hidden" name="form_type" value="Öğrenci ve Burs">

    <div class="section-title">Kişisel Bilgiler</div>
    <div class="form-group">
      <input type="text" name="adsoyad" placeholder="Ad Soyad *" required>
    </div>

    <div class="grid-group">
      <input type="text" name="tc_no" placeholder="T.C. Kimlik No">
      <input type="tel" name="telefon" placeholder="Telefon *" required>
    </div>

    <div class="form-group">
      <input type="email" name="email" placeholder="E-posta *" required>
    </div>

    <div class="section-title">Eğitim Bilgileri</div>
    <div class="grid-group">
      <select name="okul_kademesi" required>
        <option value="">Eğitim Kademesi *</option>
        <option>İlkokul</option>
        <option>Ortaokul</option>
        <option>Lise</option>
        <option>Lisans</option>
      </select>

      <input type="text" name="sinif" placeholder="Sınıf *" required>
    </div>

    <input type="text" name="okul_adi" placeholder="Okul Adı *" required>

    <!-- BURS SEÇİM -->
    <div style="margin:20px 0;">
      <label>
        <input type="radio" name="burs_secim" id="bursIste" value="evet" onchange="toggleBurs()" required>
        Burs İstiyorum
      </label><br>

      <label>
        <input type="radio" name="burs_secim" id="sadeceUye" value="hayir" onchange="toggleBurs()" required>
        Sadece Üyelik
      </label>
    </div>

    <!-- BURS ALANI -->
    <div id="bursKisim">
      <div class="section-title">Aile Bilgileri</div>

      <div class="grid-group">
        <select name="anne_durum">
          <option>Anne Durumu</option>
          <option>Sağ</option>
          <option>Vefat</option>
        </select>

        <select name="baba_durum">
          <option>Baba Durumu</option>
          <option>Sağ</option>
          <option>Vefat</option>
        </select>
      </div>

      <div class="grid-group">
        <select name="gelir">
          <option>Gelir</option>
          <option>0-17.000</option>
          <option>17.000+</option>
        </select>

        <select name="konaklama">
          <option>Konaklama</option>
          <option>Aile</option>
          <option>Yurt</option>
        </select>
      </div>
    </div>

    <div style="margin:20px 0;">
      <label>
        <input type="checkbox" required>
        Bilgiler doğru
      </label>
    </div>

    <button class="btn">Başvuruyu Tamamla</button>
  </form>
</div>
