            <input type="tel" name="telefon" placeholder="Telefon Numarası *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="email" name="email" placeholder="E-posta Adresi *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="text" name="sehir" placeholder="Şehir *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            
            <select name="brans" required style="width:100%;padding:10px;margin:8px 0;">
                <option value="">Branş Seçiniz *</option>
                <option>Matematik</option><option>Türkçe</option><option>İngilizce</option><option>Fen Bilimleri</option><option>Sosyal Bilgiler</option><option>Diğer</option>

            <select name="seviye" required style="width:100%;padding:10px;margin:8px 0;">
                <option value="">Eğitim Seviyesi Seçiniz *</option>
                <option>İlkokul</option><option>Ortaokul</option><option>Lise</option><option>Üniversite</option>
            </select>
            
            <textarea name="mesaj" placeholder="Kendinizi tanıtın ve neden gönüllü olmak istediğinizi yazınız..." required style="width:100%;padding:10px;margin:8px 0;height:100px;box-sizing:border-box;"></textarea>
            <button type="submit" style="width:100%;padding:14px;background:#00b4d8;color:white;font-weight:bold;border:none;border-radius:8px;cursor:pointer;">Başvuruyu Gönder</button>
        </form>
    </div>

    <div id="ogrenci" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
        <form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">
            <h2 style="color:#006d77; text-align:center; margin-bottom:20px;">Öğrenci Üye Ol</h2>
            <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
            <input type="tel" name="telefon" placeholder="Telefon *" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
            <input type="email" name="email" placeholder="E-posta *" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">

            <select name="okul_turu" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                <option value="">Okul Türü Seçiniz *</option>
                <option>İlkokul</option><option>Ortaokul</option><option>Lise</option><option>Meslek Lisesi</option><option>Üniversite</option>
            </select>

            <input type="text" name="okul" placeholder="Okulunuz" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">

            <div style="margin:17px 0;">
                <label style="cursor:pointer; font-weight:bold; color:#006d77;">

                </label>
            </div>

            <div id="bursForm" style="display:none; margin-top:20px; padding:15px; background:#f8f9fa; border:1px dashed #006d77; border-radius:8px;">
                <h3 style="color:#006d77; margin-top:0;">Burs Başvuru Bilgileri</h3>

                <select name="burs_okul_turu" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                    <option value="">Okuduğunuz Eğitim Düzeyi</option>
                    <option>İlkokul</option><option>Ortaokul</option><option>Lise</option><option>Ön Lisans</option><option>Lisans</option><option>Yüksek Lisans</option>

                <select name="engel_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                    <option value="">Engelli bir durumunuz var mı?</option>
                    <option>Yok</option><option>Var (Lütfen açıklamaya yazınız)</option>
                </select>

                <select name="aylik_gelir" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                    <option value="">Aylık Hane Geliri</option>
                    <option>0 - 10.000 TL</option><option>10.001 - 25.000 TL</option><option>25.001 - 40.000 TL</option><option>40.000 TL+</option>

                <select name="anne_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                    <option value="">Anne Hayatta mı?</option>
                    <option>Evet</option><option>Hayır</option>
                </select>

                <select name="baba_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
                    <option value="">Baba Hayatta mı?</option>
                    <option>Evet</option><option>Hayır</option>
                </select>

                <input type="text" name="acil_kisi" placeholder="Acil Durumda Ulaşılacak Kişi" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
                <input type="tel" name="acil_telefon" placeholder="Acil Kişi Telefonu" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">

                <textarea name="aciklama" placeholder="Eklemek istediğiniz özel durumlar (rapor, belge vb. açıklaması)" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; height:60px; box-sizing:border-box;"></textarea>
            </div>

            <button type="submit" style="background:#006d77; color:white; padding:14px; border:none; border-radius:8px; cursor:pointer; width:100%; font-size:16px; font-weight:bold; margin-top:10px;">Üye Ol ve Başvur</button>

    <div id="gonullu" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
        <form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">
            <h2 style="color:#006d77; text-align:center; margin-bottom:20px;">Üye / Gönüllü Başvurusu</h2>
            <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="tel" name="telefon" placeholder="Telefon Numarası *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="email" name="email" placeholder="E-posta Adresi *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="text" name="meslek" placeholder="Meslek / Unvan *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            
            <select name="ilgi" required style="width:100%;padding:10px;margin:8px 0;">
                <option value="">İlgi Alanı Seçiniz *</option>
                <option>Eğitim</option><option>Sosyal Yardım</option><option>Çevre</option><option>Kültür ve Sanat</option><option>Diğer</option>
            </select>
            
            <textarea name="mesaj" placeholder="Kendinizi tanıtın..." style="width:100%;padding:10px;margin:8px 0;height:100px;box-sizing:border-box;"></textarea>
            <button type="submit" style="width:100%;padding:14px;background:#9b59b6;color:white;font-weight:bold;border:none;border-radius:8px;cursor:pointer;">Başvuruyu Gönder</button>
        </form>
    </div>

    <div id="destek" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
        <form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">
            <h2 style="color:#006d77; text-align:center; margin-bottom:20px;">Destek Ol</h2>
            <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            <input type="email" name="email" placeholder="E-posta Adresi *" required style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;">
            
            <select name="destek_turu" required style="width:100%;padding:10px;margin:12px 0;">
                <option value="">Destek Türü Seçiniz *</option>
                <option>Burs Desteği</option><option>Finansal Destek</option><option>Malzeme Desteği</option><option>Gönüllülük</option>
            </select>

            <select name="odeme_yontemi" onchange="toggleIban(this.value)" required style="width:100%;padding:10px;margin:12px 0;">
                <option value="">Ödeme Yöntemi Seçiniz *</option>
                <option value="EFT_Havale">EFT / Havale</option>
                <option value="Elden">Elden Nakit</option>
            </select>

            <div id="ibanAlani" style="display:none; background:#f8f9fa; padding:15px; border-radius:8px; margin:15px 0; border:1px solid #ddd;">
                <p style="margin:0 0 5px 0; font-weight:bold; color:#006d77;">Dernek IBAN:</p>
                <input type="text" value="TR00 0000 0000 0000 0000 0000 00" readonly style="width:100%; padding:10px; background:#e0f7fa; border:1px solid #aaa; border-radius:6px; font-family:monospace;">
            </div>

            <textarea name="mesaj" placeholder="Eklemek istediğiniz notlar..." style="width:100%; padding:10px; margin:12px 0; height:80px; box-sizing:border-box;"></textarea>
            <button type="submit" style="width:100%; padding:14px; background:#e67e22; color:white; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">Gönder</button>
        </form>
    </div>

</div>

<script>
// Tab kontrolü
function openTab(tabName){
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = "none");
    document.getElementById(tabName).style.display = "block";
}

// Burs formunu göster/gizle
function toggleBurs(checkbox) {
    document.getElementById("bursForm").style.display = checkbox.checked ? "block" : "none";
}

// IBAN alanını göster/gizle
function toggleIban(val) {
    document.getElementById("ibanAlani").style.display = (val === "EFT_Havale") ? "block" : "none";
}

// Form gönderme (AJAX)
function sendForm(e){
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerText = "Gönderiliyor...";

    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {'Accept': 'application/json'}
    }).then(r => {
        if(r.ok){
            document.getElementById("successMessage").style.display = "block";
            form.reset();
            if(document.getElementById("bursForm")) document.getElementById("bursForm").style.display = "none";
            if(document.getElementById("ibanAlani")) document.getElementById("ibanAlani").style.display = "none";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }).finally(() => {
        btn.disabled = false;
        btn.innerText = "Gönder";
    });
}
</script>
