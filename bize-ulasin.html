<!-- ====================== BİZE ULAŞIN FORMU ====================== -->
<section class="bg-gray-100 py-12">

    <div class="max-w-7xl mx-auto px-6 flex justify-end">

        <div class="w-full md:w-[450px] bg-white rounded-3xl shadow-xl border border-gray-200 p-8">

            <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto bg-red-100 rounded-full flex items-center justify-center text-3xl mb-3">
                    ✉️
                </div>

                <h2 class="text-2xl font-bold text-red-700">
                    Bize Ulaşın
                </h2>

                <p class="text-gray-600 text-sm mt-2">
                    Görüş, öneri ve taleplerinizi bizimle paylaşabilirsiniz.
                </p>
            </div>

            <form action="https://formspree.io/f/xpqowknj" method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Ad Soyad
                    </label>

                    <input
                        type="text"
                        name="name"
                        required
                        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        E-posta
                    </label>

                    <input
                        type="email"
                        name="email"
                        required
                        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Konu
                    </label>

                    <select
                        name="subject"
                        required
                        class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600">

                        <option value="">Konu Seçiniz</option>
                        <option>Öneri</option>
                        <option>Talep</option>
                        <option>Şikayet</option>
                        <option>Teşekkür</option>
                        <option>Diğer</option>

                    </select>

                </div>

                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Mesajınız
                    </label>

                    <textarea
                        name="message"
                        rows="5"
                        required
                        class="w-full px-4 py-3 border rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-red-600"></textarea>

                </div>

                <button
                    type="submit"
                    class="w-full bg-red-700 hover:bg-red-800 text-white font-semibold py-3 rounded-xl transition duration-300">

                    Mesaj Gönder

                </button>

            </form>

        </div>

    </div>

</section>
