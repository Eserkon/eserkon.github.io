<!-- ====================== BİZE ULAŞIN FORMU ====================== -->
<div class="flex justify-end py-12 px-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        
        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center text-4xl">
                ✉️
            </div>
            <div>
                <h2 class="text-2xl font-bold text-red-700">Bize Ulaşın</h2>
                <p class="text-gray-600 text-sm">Önerileriniz ve talepleriniz için</p>
            </div>
        </div>

        <form id="bizeUlasinForm" action="https://formspree.io/f/xpqowknj" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Ad Soyad</label>
                <input type="text" name="name" required class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">E-posta</label>
                <input type="email" name="email" required class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Konu</label>
                <select name="subject" required class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">Konu Seçin</option>
                    <option>Öneri</option>
                    <option>Şikayet</option>
                    <option>Talep</option>
                    <option>Yardım</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Mesajınız</label>
                <textarea name="message" rows="5" required class="w-full px-5 py-3 border border-gray-300 rounded-3xl focus:outline-none focus:ring-2 focus:ring-red-500 resize-none"></textarea>
            </div>
            <button type="submit" class="w-full bg-red-700 hover:bg-red-800 text-white font-semibold py-4 rounded-2xl text-lg transition">
                Gönder
            </button>
        </form>
    </div>
</div>
