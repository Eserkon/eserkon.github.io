 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bize Ulaşın - ESERKON</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 40px 15px;
    }

    .container {
      max-width: 1076px;
      margin: auto;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      padding: 20px;
    }

    .header {
      background: #7c5c3e;
      color: white;
      text-align: center;
      padding: 22px;
      font-size: 26px;
      font-weight: bold;
    }

    .marquee-container {
      background: #7c5c3e;
      color: white;
      overflow: hidden;
      white-space: nowrap;
      height: 48px;
      line-height: 48px;
      font-weight: 600;
      font-size: 18px;
    }

    .marquee {
      display: inline-block;
      padding-left: 100%;
      animation: kay 20s linear infinite;
    }

    @keyframes kay {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .form-body {
      padding: 30px;
    }

    label {
      font-weight: 600;
      margin-top: 15px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #7c5c3e;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #5d432c;
    }

    #thankyou {
      display: none;
      text-align: center;
      padding: 30px;
      background: #f8fafc;
      border-radius: 12px;
      margin-top: 20px;
    }

    #thankyou h2 {
      color: #333;
      font-size: 24px;
    }

    #thankyou a {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #7c5c3e;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    #thankyou a:hover {
      background: #5d432c;
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
        margin: 10px;
      }
      .form-body {
        padding: 20px;
      }
      .header {
        font-size: 22px;
        padding: 15px;
      }
      .marquee-container {
        font-size: 16px;
        height: 40px;
        line-height: 40px;
      }
    }

    .home-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      z-index: 9999;
    }

    .home-btn:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>

  <!-- ANA SAYFAYA DÖN -->
  <a class="home-btn" href="anasayfa.html">🏠 Ana Sayfaya Dön</a>

  <!-- İÇERİK -->
  <div class="container">
    <div class="header">BİZE ULAŞIN</div>

    <div class="marquee-container">
      <div class="marquee">
        DERNEĞİMİZ İÇİN ŞİKAYET VE ÖNERİLERİNİZİ BİZE YAZABİLİRSİNİZ BİZİM İÇİN GÖRÜŞLERİNİZ ÖNEMLİDİR     
        DERNEĞİMİZ İÇİN ŞİKAYET VE ÖNERİLERİNİZİ BİZE YAZABİLİRSİNİZ BİZİM İÇİN GÖRÜŞLERİNİZ ÖNEMLİDİR
      </div>
    </div>

    <div class="form-body">
      <form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="return showMessage()">
        <label>Adınız Soyadınız</label>
        <input type="text" name="name" placeholder="Ad Soyad" required />

        <label>Telefon Numaranız</label>
        <input type="tel" name="phone" placeholder="05XXX XXX XX XX" />

        <label>E-posta Adresiniz</label>
        <input type="email" name="email" placeholder="ornek@email.com" required />

        <label>Konu / Tür</label>
        <select name="subject" required>
          <option value="">Seçiniz...</option>
          <option>Öneri</option>
          <option>Şikayet</option>
          <option>Talep</option>
          <option>Yardım</option>
        </select>

        <label>Mesajınız</label>
        <textarea name="message" placeholder="Mesajınızı yazın..." required></textarea>

        <button type="submit">GÖNDER</button>
      </form>

      <div id="thankyou">
        <h2>Teşekkür ederiz, mesajınız tarafımıza iletilmiştir.</h2>
        <a href="javascript:location.reload()">Ana Sayfaya Dön</a>
      </div>
    </div>
  </div>

  <script>
    function showMessage() {
      document.querySelector("form").style.display = "none";
      document.getElementById("thankyou").style.display = "block";
      return false;
    }
  </script>

</body>
</html>
