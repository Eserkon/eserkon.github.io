        <option value="">Destek Türü Seçiniz</option>
        <option value="Finansal Destek">Finansal Destek</option>
        <option value="Burs Desteği">Burs Desteği</option>

        <option value="Zaman / Gönüllülük">Zaman / Gönüllülük</option>
        <option value="Eğitim Desteği">Eğitim Desteği</option>
        <option value="Ulaşım Desteği">Ulaşım Desteği</option>
        <option value="Konaklama Desteği">Konaklama Desteği</option>
        <option value="Kahvaltı / Yemek Desteği">Kahvaltı / Yemek Desteği</option>
        <option value="Diğer">Diğer</option>
      </select>

      <!-- Dinamik Alanlar -->
      <div id="dynamicFields" style="margin:15px 0;"></div>

      <textarea name="mesaj" placeholder="Ek detay ve notlarınızı yazınız..."

      <button type="submit" 
              style="background:#006d77; color:white; padding:14px; border:none; border-radius:6px; cursor:pointer; width:100%; font-size:17px; margin-top:10px;">
        Destek Talebimi Gönder
      </button>
    </form>
  </div>
</div>

<script>
// Dinamik Alan Yönetimi
function destekTuruSecildi(deger) {
    const dynamic = document.getElementById('dynamicFields');
    dynamic.innerHTML = '';

    const iban = "TR00 0000 0000 0000 0000 0000 00"; // Gerçek IBAN'ınızı buraya yazın

    if (deger === "Finansal Destek" || deger === "Burs Desteği") {
        dynamic.innerHTML = `
            <div style="background:#e0f7fa; padding:18px; border-radius:10px; margin:15px 0;">
                <p style="margin:0 0 12px 0; font-weight:600; color:#006d77;">💰 Ödeme Bilgileri</p>
                <p><strong>IBAN:</strong> ${iban}</p>
                <input type="text" name="odeme_tutari" placeholder="Ödeme yaptığınız tutar (₺)" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;">
                <small style="color:#555;">Dekontu mesaj kısmına ekleyebilir veya e-posta ile gönderebilirsiniz.</small>
            </div>
        `;
    } 
    else if (deger === "Malzeme Bağışı") {
        dynamic.innerHTML = `
            <textarea name="malzeme_detay" placeholder="Bağışlamak istediğiniz malzemeleri detaylı yazın..." 
                      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px; height:90px;"></textarea>
        `;
    } 
    else if (deger === "Zaman / Gönüllülük") {
        dynamic.innerHTML = `
            <input type="text" name="gorev_alani" placeholder="Hangi alanda gönüllü olmak istersiniz?" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;">
            <input type="text" name="zaman" placeholder="Haftada kaç saat ayırabilirsiniz?" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;">
        `;
    } 
    else if (deger === "Kahvaltı / Yemek Desteği") {
        dynamic.innerHTML = `
            <input type="text" name="yemek_kisi" placeholder="Kaç kişilik destek vereceksiniz?" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;">
        `;
    } 
    else if (deger === "Konaklama Desteği" || deger === "Ulaşım Desteği") {
        dynamic.innerHTML = `
            <textarea name="detay" placeholder="Detayları yazınız (kişi sayısı, tarih, süre vb.)" 
                      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px; height:80px;"></textarea>
        `;
    } 
    else if (deger === "Eğitim Desteği") {
        dynamic.innerHTML = `
            <input type="text" name="egitim_konusu" placeholder="Hangi konuda eğitim desteği?" style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;">
        `;
    } 
    else if (deger === "Diğer") {
        dynamic.innerHTML = `
            <textarea name="diger_detay" placeholder="Lütfen destek türünüzü ve detayları açıklayın..." 
                      style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px; height:90px;"></textarea>
        `;
    }
}
</script>
