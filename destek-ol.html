<!-- ==================== SAĞ TARAF - GELİŞTİRİLMİŞ DESTEK OL FORMU ==================== -->
<div class="lg:col-span-4">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 sticky top-8">
        <div class="bg-gradient-to-r from-red-600 to-red-700 text-white p-6 text-center">
            <div class="text-5xl mb-3">❤️</div>
            <h3 class="text-2xl font-bold">Destek Ol</h3>
            <p class="text-red-100 mt-1">Birlikte Daha Güçlü Olalım</p>
        </div>

        <div class="p-6">
            <form id="destekFormSidebar" action="https://formspree.io/f/mgvglwbz" method="POST">
                
                <input type="text" name="adsoyad" placeholder="Ad Soyad" required class="w-full p-4 border border-gray-300 rounded-xl mb-4">
                <input type="email" name="email" placeholder="E-Posta Adresiniz" required class="w-full p-4 border border-gray-300 rounded-xl mb-4">
                <input type="tel" name="telefon" placeholder="Telefon Numaranız" class="w-full p-4 border border-gray-300 rounded-xl mb-4">

                <!-- Destek Türü -->
                <select id="destekSecimSidebar" name="destek_turu" required class="w-full p-4 border border-gray-300 rounded-xl mb-4">
                    <option value="">Destek Türü Seçiniz</option>
                    <option value="finans">💳 Finansal Destek</option>
                    <option value="burs">🎓 Burs Desteği</option>
                    <option value="yemek">🍽 Yemek/Kahvaltı Desteği</option>
                    <option value="egitim">📚 Eğitim Desteği</option>
                    <option value="malzeme">📦 Malzeme Bağışı</option>
                    <option value="gonullu">🤝 Gönüllülük</option>
                </select>

                <!-- Dinamik Alan -->
                <div id="dynamicContent" class="mb-6"></div>

                <textarea name="mesaj" rows="3" placeholder="Ek açıklama yazabilirsiniz..." class="w-full p-4 border border-gray-300 rounded-xl mb-6"></textarea>

                <button type="submit" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-2xl text-lg transition">
                    Talebimi Gönder
                </button>
            </form>
        </div>
    </div>
</div>
