<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Destek Ol</title>
<style>
body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
    }
    .support-form {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 360px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 20px;
      z-index: 1000;
      border: 1px solid #e0e0e0;
    }
    h3 {
      margin: 0 0 16px;
      color: #1a3a6c;
      font-size: 20px;
      text-align: center;
    }
    select, input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #0057b7;
    }
    button {
      background: #0057b7;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #003d82;
    }
    .section {
      margin-top: 14px;
      padding: 12px;
      background: #f8f9ff;
      border-radius: 8px;
      border: 1px dashed #0057b7;
      display: none;
    }
    .iban-display {
      font-family: monospace;
      font-size: 14px;
      background: #eef2ff;
      padding: 10px;
      border-radius: 6px;
      margin: 8px 0;
    }
  </style>
</head>
<body>
<div class="support-form">
<h3>🎯 Destek Ol</h3>
<select id="supportType">
<option value="">Destek Türünü Seçin</option>
<option value="financial">💳 Finansal Destek</option>
<option value="burs">🎓 Burs Desteği</option>
<option value="food">🍳 Yemek ve Kahvaltı Desteği</option>
<option value="education">📚 Eğitim Desteği</option>
<option value="material">📦 Malzeme Bağışı</option>
</select>
<div id="planSection" class="section">
<strong>📅 Ödeme Planı Seçin:</strong>
<div id="plans"></div>
</div>
<div id="bankSection" class="section">
<label><strong>🏦 Banka Seçin:</strong></label>
<select id="bankSelect"></select>
<div><strong>IBAN:</strong></div>
<div id="ibanDisplay" class="iban-display"></div>
</div>
<div id="amountSection" class="section">
<label><strong>₺ Tutar Girin:</strong></label>
<input type="number" id="amountInput" placeholder="Örneğin: 500" />
</div>
<div id="paySection" class="section">
<button onclick="confirmPayment()">💳 Ödeme Başlat</button>
</div>
</div>
<script>
// Hayali IBAN'lar — sen gerçekleriyle değiştir
    const ibans = {
      ziraat: "TR44 0001 0012 3456 7890 1234 56",
      isbank: "TR39 0006 4000 0012 3456 7890",
      halk: "TR14 0001 2000 0012 3456 7890",
      vakif: "TR27 0001 5000 0012 3456 7890"
    };

    // Destek türlerine göre ödeme planları
    const plans = {
      financial: ["3 ay × 500₺", "6 ay × 400₺", "12 ay × 300₺"],
      burs: ["Lise: 1.200₺/ay", "Üniversite: 1.800₺/ay", "Yüksek Lisans: 2.500₺/ay"],
      food: ["Aile: 300₺/ay", "Bireysel: 150₺/ay"],
      education: ["Kurs: 800₺/ay", "Eğitmen: 2.000₺/ay"],
      material: ["Temel Malzeme: 500₺/ay", "Özel Ekipman: 1.000₺/ay"]
    };

    // Destek türü seçildiğinde ödeme planlarını göster
    document.getElementById("supportType").addEventListener("change", function () {
      const type = this.value;
      resetForm();

      if (type && plans[type]) {
        const plansDiv = document.getElementById("plans");
        plansDiv.innerHTML = "";
        plans[type].forEach(plan => {
          const label = document.createElement("label");
          label.innerHTML = `<input type="radio" name="plan" value="${plan}"> ${plan}`;
          plansDiv.appendChild(label);
        });
        document.getElementById("planSection").style.display = "block";
      }
    });

    // Plan seçildiğinde banka seçimi göster
    function showBank() {
      const bankSelect = document.getElementById("bankSelect");
      bankSelect.innerHTML = "";
      Object.keys(ibans).forEach(key => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = 
          key === "ziraat" ? "Ziraat Bankası" :
          key === "isbank" ? "İş Bankası" :
          key === "halk" ? "Halk Bankası" : "VakıfBank";
        bankSelect.appendChild(option);
      });
      document.getElementById("bankSection").style.display = "block";
    }

    // Banka seçildiğinde IBAN göster
    document.getElementById("bankSelect").addEventListener("change", function () {
      const bank = this.value;
      document.getElementById("ibanDisplay").textContent = ibans[bank];
      document.getElementById("amountSection").style.display = "block";
    });

    // Tutar girildiğinde ödeme başlatma butonunu göster
    document.getElementById("amountInput").addEventListener("input", function () {
      if (this.value > 0) {
        document.getElementById("paySection").style.display = "block";
      } else {
        document.getElementById("paySection").style.display = "none";
      }
    });

    // Ödeme onayı ve yönlendirme
    function confirmPayment() {
      const amount = document.getElementById("amountInput").value;
      const plan = document.querySelector('input[name="plan"]:checked')?.value;
      const bankText = document.getElementById("bankSelect").selectedOptions[0]?.text;

      if (!plan) return alert("Lütfen bir ödeme planı seçin.");
      if (!amount || amount <= 0) return alert("Lütfen geçerli bir tutar girin.");

      const confirm = window.confirm(
        `Aşağıdaki detaylarla ödeme başlatılsın mı?\n\n` +
        `Destek Türü: ${document.getElementById("supportType").selectedOptions[0].text}\n` +
        `Plan: ${plan}\n` +
        `Banka: ${bankText}\n` +
        `Tutar: ${amount}₺`
      );

      if (confirm) {
        // ⚠️ SEN BURAYA KENDİ ÖDEME SİSTEMİNİN LİNKİNİ VEYA ENTegrasyon KODUNU KOYACAKSIN
        alert("Ödeme işlemi başlatılıyor. Yönlendiriliyorsunuz...");
        // Örnek: window.location.href = "https://odeme.seninadresin.com?amount=" + amount;
      }
    }

    // Formu sıfırla
    function resetForm() {
      document.getElementById("planSection").style.display = "none";
      document.getElementById("bankSection").style.display = "none";
      document.getElementById("amountSection").style.display = "none";
      document.getElementById("paySection").style.display = "none";
      document.getElementById("plans").innerHTML = "";
      document.getElementById("ibanDisplay").textContent = "";
      document.getElementById("amountInput").value = "";
    }
  </script>
</body>
</html>
