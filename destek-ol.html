<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Destek Ol</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f7fa;
}
.support-form {
  max-width: 1100px;
  margin: 0 auto;
  background: white;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  padding: 25px;
  border: 1px solid #e0e0e0;
}
h3 {
  margin: 0 0 20px;
  color: #1a3a6c;
  font-size: 24px;
  text-align: center;
}
.form-container {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
}
.left-side {
  flex: 1;
  min-width: 280px;
}
.right-side {
  flex: 1;
  min-width: 280px;
  background: #f8f9ff;
  padding: 20px;
  border-radius: 12px;
}
select, input, textarea, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
}
button {
  background: #0057b7;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
  padding: 14px;
  font-size: 16px;
  margin-top: 15px;
}
button:hover {
  background: #003d82;
}
.section {
  margin-top: 15px;
  padding: 15px;
  background: white;
  border-radius: 10px;
  border: 1px dashed #0057b7;
  display: none;
}
.iban-display {
  font-family: monospace;
  background: #eef2ff;
  padding: 12px;
  border-radius: 6px;
  margin: 10px 0;
}
@media (max-width: 768px) {
  .form-container {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="support-form">
  <h3>🎯 Destek Ol - ESERKON Yaşam Merkezi</h3>
  
  <div class="form-container">
    
    <!-- Sol Taraf: Bilgiler -->
    <div class="left-side">
      <label><strong>👤 Ad Soyad</strong></label>
      <input type="text" id="fullName" placeholder="Adınızı ve Soyadınızı girin" required />

      <label><strong>📞 Telefon</strong></label>
      <input type="tel" id="phoneNumber" placeholder="05xx xxx xx xx" required />

      <label><strong>Destek Türü</strong></label>
      <select id="supportType" onchange="destekTuruSecildi(this.value)">
        <option value="">Seçiniz...</option>
        <option value="financial">💳 Finansal Destek</option>
        <option value="burs">🎓 Burs Desteği</option>
        <option value="food">🍳 Yemek / Kahvaltı Desteği</option>
        <option value="education">📚 Eğitim Desteği</option>
        <option value="material">📦 Malzeme Bağışı</option>
      </select>
    </div>

    <!-- Sağ Taraf: Dinamik Alanlar -->
    <div class="right-side">
      <div id="dynamicContent"></div>
    </div>
  </div>

  <button onclick="confirmPayment()" style="width:100%;">💳 Ödeme Başlat</button>
</div>

<script>
function destekTuruSecildi(tur) {
  const content = document.getElementById('dynamicContent');
  content.innerHTML = '';

  if (tur === "financial" || tur === "burs") {
    content.innerHTML = `
      <strong>💰 Ödeme Tutarı Seçin</strong>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(80px,1fr)); gap:8px; margin:12px 0;">
        <button onclick="setAmount(250)" style="padding:10px; border:1px solid #ddd; border-radius:6px;">250 ₺</button>
        <button onclick="setAmount(500)" style="padding:10px; border:1px solid #ddd; border-radius:6px;">500 ₺</button>
        <button onclick="setAmount(1000)" style="padding:10px; border:1px solid #ddd; border-radius:6px;">1.000 ₺</button>
        <button onclick="setAmount(2500)" style="padding:10px; border:1px solid #ddd; border-radius:6px;">2.500 ₺</button>
        <button onclick="setAmount(5000)" style="padding:10px; border:1px solid #ddd; border-radius:6px;">5.000 ₺</button>
      </div>
      <input type="number" id="amountInput" placeholder="Özel tutar girin" style="margin-top:10px;">
      
      <div style="margin-top:15px;">
        <strong>🏦 IBAN</strong><br>
        <div class="iban-display">TR44 0001 0012 3456 7890 1234 56</div>
      </div>
    `;
  } else {
    content.innerHTML = `<p style="color:#555;">Seçtiğiniz destek türü için lütfen detayları mesaj kısmına yazınız.</p>`;
  }
}

function setAmount(tutar) {
  document.getElementById('amountInput').value = tutar;
}

function confirmPayment() {
  const name = document.getElementById('fullName').value;
  const amount = document.getElementById('amountInput').value;
  
  if (!name) return alert("Lütfen ad soyad giriniz.");
  if (!amount) return alert("Lütfen bir tutar seçiniz veya giriniz.");

  alert(`✅ Teşekkürler!\n\nAd: ${name}\nTutar: ${amount} ₺\n\nÖdeme işlemi başlatılıyor...`);
}
</script>

</body>
</html>
