<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Destek Ol</title>
<style>
body { font-family: Arial, sans-serif; }
    #supportForm {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    select, button { width: 100%; padding: 8px; margin: 8px 0; }
    .plan, .bank { margin-top: 10px; }
    .qr-data { font-size: 12px; background: #f0f0f0; padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
<div id="supportForm">
<h3>Destek Ol</h3>
<select id="type">
<option>Destek Türü Seçin</option>
<option value="financial">Finansal Destek</option>
</select>
<div id="plans" class="plan"></div>
<div id="banks" class="bank"></div>
</div>
<script>
const ibans = {
      ziraat: "TR44 0001 0012 3456 7890 1234 56",
      isbank: "TR39 0006 4000 0012 3456 7890",
      halk: "TR14 0001 2000 0012 3456 7890",
      vakif: "TR27 0001 5000 0012 3456 7890"
    };

    document.getElementById("type").onchange = function () {
      const selected = this.value;
      const plansDiv = document.getElementById("plans");
      const banksDiv = document.getElementById("banks");
      plansDiv.innerHTML = "";
      banksDiv.innerHTML = "";

      if (selected === "financial") {
        // Ödeme Planları
        plansDiv.innerHTML = `
          <strong>Ödeme Planları:</strong><br>
          • 3 ay × 500₺ = 1.500₺<br>
          • 6 ay × 400₺ = 2.400₺<br>
          • 12 ay × 300₺ = 3.600₺
        `;

        // Banka IBAN'ları ve QR Verileri
        banksDiv.innerHTML = `<strong>IBAN Bilgileri:</strong><br>`;
        for (const [bank, iban] of Object.entries(ibans)) {
          const bankName = bank === "ziraat" ? "Ziraat" :
                           bank === "isbank" ? "İş Bankası" :
                           bank === "halk" ? "Halk Bankası" : "VakıfBank";
          banksDiv.innerHTML += `
            <div><b>${bankName}:</b> ${iban}</div>
            <div class="qr-data">
              <b>QR Veri (örnek):</b> BCD\n002\n1\nSCT\n\n${bank.toUpperCase()}\nDestekçi\n300.00\nEUR\n${iban}\n\nAidat: 300 TL
            </div>
          `;
        }
      }
    };
  </script>
</body>
</html>
