<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Destek Ol</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: #f5f7fa;
}
.support-form {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: space-between;
  align-items: flex-start;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  padding: 20px;
  margin: 20px;
}
.support-form h3 {
  flex-basis: 100%;
  margin: 0 0 16px;
  color: #1a3a6c;
  font-size: 20px;
  text-align: center;
}
.field {
  flex: 1 1 200px;
  display: flex;
  flex-direction: column;
}
.field label {
  font-weight: bold;
  margin-bottom: 5px;
}
select, input, textarea, button {
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}
button {
  background: #0057b7;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: background 0.3s;
}
button:hover {
  background: #003d82;
}
.iban-display {
  font-family: monospace;
  font-size: 14px;
  background: #eef2ff;
  padding: 10px;
  border-radius: 6px;
  margin-top: 5px;
}
@media (max-width: 768px) {
  .support-form {
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="support-form">
  <h3>🎯 Destek Ol</h3>

  <div class="field">
    <label>👤 Ad Soyad</label>
    <input type="text" id="fullName" placeholder="Adınızı ve Soyadınızı girin" required />
  </div>

  <div class="field">
    <label>📞 Telefon</label>
    <input type="tel" id="phoneNumber" placeholder="05xx xxx xx xx" required />
  </div>

  <div class="field">
    <label>Destek Türü</label>
    <select id="supportType">
      <option value="">Seçin</option>
      <option value="financial">💳 Finansal Destek</option>
      <option value="burs">🎓 Burs Desteği</option>
      <option value="food">🍳 Yemek Desteği</option>
      <option value="education">📚 Eğitim Desteği</option>
      <option value="material">📦 Malzeme Bağışı</option>
    </select>
  </div>

  <div class="field" id="planSection" style="display:none;">
    <label>📅 Ödeme Planı</label>
    <div id="plans"></div>
  </div>

  <div class="field" id="bankSection" style="display:none;">
    <label>🏦 Banka</label>
    <select id="bankSelect"></select>
    <div id="ibanDisplay" class="iban-display"></div>
  </div>

  <div class="field" id="amountSection" style="display:none;">
    <label>₺ Tutar</label>
    <input type="number" id="amountInput" placeholder="Örn: 500" />
  </div>

  <div class="field" id="descSection" style="display:none;">
    <label>📝 Açıklama</label>
    <textarea id="descInput" readonly>Eserkon Yaşam Merkezine Bağış</textarea>
  </div>

  <div class="field" id="paySection" style="display:none;">
    <button onclick="confirmPayment()">💳 Ödeme Başlat</button>
  </div>
</div>

<script>
const ibans = {
  ziraat: "TR44 0001 0012 3456 7890 1234 56",
  isbank: "TR39 0006 4000 0012 3456 7890",
  halk: "TR14 0001 2000 0012 3456 7890",
  vakif: "TR27 0001 5000 0012 3456 7890"
};

const plans = {
  financial: ["3 ay × 500₺", "6 ay × 400₺", "12 ay × 300₺"],
  burs: ["Lise: 1.200₺/ay", "Üniversite: 1.800₺/ay", "Yüksek Lisans: 2.500₺/ay"],
  food: ["Aile: 300₺/ay", "Bireysel: 150₺/ay"],
  education: ["Kurs: 800₺/ay", "Eğitmen: 2.000₺/ay"],
  material: ["Temel Malzeme: 500₺/ay", "Özel Ekipman: 1.000₺/ay"]
};

document.getElementById("supportType").addEventListener("change", function () {
  const type = this.value;
  resetForm();

  if (type && plans[type]) {
    const plansDiv = document.getElementById("plans");
    plansDiv.innerHTML = "";
    plans[type].forEach(plan => {
      const label = document.createElement("label");
      label.style.display = "block";
      label.innerHTML = `<input type="radio" name="plan" value="${plan}"> ${plan}`;
      plansDiv.appendChild(label);
    });
    document.getElementById("planSection").style.display = "block";

    document.querySelectorAll('input[name="plan"]').forEach(radio => {
      radio.addEventListener("change", showBank);
    });
  }
});

function showBank() {
  const bankSelect = document.getElementById("bankSelect");
  bankSelect.innerHTML = "";
  Object.keys(ibans).forEach(key => {
    const option = document.createElement("option");
    option.value = key;
    option.textContent = 
      key === "ziraat" ? "Ziraat Bankası" :
      key === "isbank" ? "İş Bankası" :
      key === "halk" ? "Halk Bankası" : "VakıfBank";
    bankSelect.appendChild(option);
  });
  document.getElementById("bankSection").style.display = "block";
}

document.getElementById("bankSelect").addEventListener("change", function () {
  const bank = this.value;
  document.getElementById("ibanDisplay").textContent = ibans[bank];
  document.getElementById("amountSection").style.display = "block";
});

document.getElementById("amountInput").addEventListener("input", function () {
  if (this.value > 0) {
    document.getElementById("descSection").style.display = "block";
    document.getElementById("paySection").style.display = "block";
  } else {
    document.getElementById("paySection").style.display = "none";
  }
});

function confirmPayment() {
  const fullName = document.getElementById("fullName").value;
  const phone = document.getElementById("phoneNumber").value;
  const amount = document.getElementById("amountInput").value;
  const plan = document.querySelector('input[name="plan"]:checked')?.value;
  const bankText = document.getElementById("bankSelect").selectedOptions[0]?.text;
  const desc = document.getElementById("descInput").value;

  if (!fullName) return alert("Lütfen ad soyad girin.");
  if (!phone) return alert("Lütfen telefon numarası girin.");
  if (!plan) return alert("Lütfen bir ödeme planı seçin.");
  if (!amount || amount <= 0) return alert("Lütfen geçerli bir tutar girin.");

  alert(
    `Ödeme Detayları:\n\n` +
    `Ad Soyad: ${fullName}\n` +
    `Telefon: ${phone}\n` +
    `Destek Türü: ${document.getElementById("supportType").selectedOptions[0].text}\n` +
    `Plan: ${plan}\n` +
    `Banka: ${bankText}\n` +
    `IBAN: ${document.getElementById("ibanDisplay").textContent}\n` +
    `Tutar: ${amount}₺\n` +
    `Açıklama: ${desc}`
  );
}

function resetForm()
