 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dijital Kartvizit - ESERKON</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    /* KART */
    .qr-card {
      background: white;
      padding: 40px 30px;
      border-radius: 30px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      max-width: 350px;
      width: 90%;
    }

    /* ÜST BAŞLIK */
    .qr-title {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .qr-title .line1 {
      font-size: 22px;
      font-weight: bold;
      color: #0f2027;
      animation: slideDown 1s ease forwards;
      opacity: 0;
    }

    .qr-title .line2 {
      font-size: 16px;
      color: #0077ff;
      font-weight: 600;
      animation: pulseHeart 1.5s infinite;
      opacity: 0;
      animation-delay: 0.4s;
    }

    @keyframes slideDown {
      from { transform: translateY(-40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulseHeart {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* QR */
    .qr-wrapper {
      position: relative;
      display: inline-block;
    }

    .qr-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: white;
      padding: 6px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .qr-image {
      width: 250px;
      border-radius: 20px;
      padding: 10px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .qr-image:hover {
      transform: scale(1.05);
    }

    /* NEON ESERKON */
    .neon-eskon {
      margin-top: 25px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #1e2a78;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;

      text-shadow:
        0 0 5px #1e2a78,
        0 0 15px #1e2a78,
        0 0 25px #1e2a78;

      animation: neonGlow 2s infinite;
    }

    .neon-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: white;
      padding: 3px;
      box-shadow: 0 0 10px #1e2a78;
    }

    @keyframes neonGlow {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .qr-text {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
      opacity: 0.8;
    }

    .home-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      z-index: 9999;
    }

    .home-btn:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>

  <!-- ANA SAYFAYA DÖN -->
  <a href="anasayfa.html"class="home-btn">🏠 Ana Sayfaya Dön</a>

  <!-- QR KART -->
  <div class="qr-card">

    <!-- BAŞLIK -->
    <div class="qr-title">
      <span class="line1">📲 QR Kodu Tarat</span>
      <span class="line2">💼 Dijital Kartvizite Anında Ulaş</span>
    </div>

    <!-- QR KODU -->
    <div class="qr-wrapper">
      <!-- Yeni QR: içinde ESERKON logolu -->
      <img class="qr-logo"
           src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjNy5QU8NfJS6NTjx8VuJ0Yldl1up8h2aYUAEfYJHrFjc-wKfbRpmKfzMtb4JkydIIEcNXe9Icc-hmcqqO6jCNSX0Lfm3Ikl524vQvF8in5c6ni3A0i4HtCc3pJTHa9znfYk98m-7kHZRpBpde5VxI-N8rdRnqf-ABVnzcOq0w98EQPwVA9Zjfh_pcgFaA/s1024/d%C3%BCzeltildi.jpg" />

      <img class="qr-image"
           src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https%3A%2F%2Feskon-baskan-kartvizit.blogspot.com%2F" />
    </div>

    <!-- NEON ESERKON -->
    <div class="neon-eskon">
      E S E R
      <img class="neon-logo"
           src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjNy5QU8NfJS6NTjx8VuJ0Yldl1up8h2aYUAEfYJHrFjc-wKfbRpmKfzMtb4JkydIIEcNXe9Icc-hmcqqO6jCNSX0Lfm3Ikl524vQvF8in5c6ni3A0i4HtCc3pJTHa9znfYk98m-7kHZRpBpde5VxI-N8rdRnqf-ABVnzcOq0w98EQPwVA9Zjfh_pcgFaA/s1024/d%C3%BCzeltildi.jpg" />
      K O N
    </div>

    <!-- HOŞGELDİNİZ -->
    <div class="qr-title">
      <span class="line2">Hoşgeldiniz</span>
    </div>

  </div>

</body>
</html>
