    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }

    .hero img.big-logo {
      max-width: 240px;
      margin-bottom: 30px;
    }

    .hero img.inline-logo {
      background: transparent !important;
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }

    .hero-text h1 {
      font-size: 5.5rem;
      margin: 10px 0;
      font-weight: 700;
      animation: eskon-heartbeat 1.6s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
    }

    .hero-text p {
      font-size: 1.9rem;
      letter-spacing: 3px;
      margin: 20px 0 60px;
      font-weight: 600;
      animation: slogan-pulse 3s ease-in-out infinite;
    }

    @keyframes eskon-heartbeat {
      from {
        transform: scale(1);
        text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #00c6ff, 0 0 80px #0095ff;
      }
      to {
        transform: scale(1.18);
        text-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 80px #00c6ff, 0 0 140px #0095ff;
      }
    }

    @keyframes slogan-pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 12px rgba(255,255,255,0.6); }
      50% { transform: scale(1.14); text-shadow: 0 0 20px #00ff9d, 0 0 35px #ffdd00, 0 0 55px #ff6b6b, 0 0 70px #c084fc; }
    }

    .eskon-blue { color: #00eaff; }
    .green      { color: #00ff9d; }
    .orange     { color: #ffaa00; }
    .purple     { color: #c084fc; }
    .darkred    { color: #e63946; }
    .eskon-white { color: white; }

    .qr-box {
      max-width: 320px;
      margin: -40px auto 80px;
      padding: 25px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
      color: #0d1b2a;
    }

    .qr-box .title, .qr-box .subtitle {
      font-weight: 600;
      animation: heartbeat-text 1.8s ease-in-out infinite alternate;
      text-shadow: 0 0 8px rgba(0,0,0,0.2);
    }

    .qr-box .title {
      font-size: 1.2rem;
      color: #0077b6;
      margin: 8px 0;
    }

    .qr-box .subtitle {
      font-size: 1rem;
      color: #1b263b;
      margin: 8px 0 20px;
    }

    @keyframes heartbeat-text {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.08);
      }
    }

    .qr-box img {
      width: 220px;
      border-radius: 8px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }
