 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON Katılım Formları</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }

    .hero img.big-logo {
      max-width: 240px;
      margin-bottom: 30px;
    }

    .hero img.inline-logo {
      background: transparent !important;
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }

    .hero-text h1 {
      font-size: 5.5rem;
      margin: 10px 0;
      font-weight: 700;
      animation: eskon-heartbeat 1.6s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
    }

    .hero-text p {
      font-size: 1.9rem;
      letter-spacing: 3px;
      margin: 20px 0 60px;
      font-weight: 600;
      animation: slogan-pulse 3s ease-in-out infinite;
    }

    @keyframes eskon-heartbeat {
      from { transform: scale(1); }
      to { transform: scale(1.18); }
    }

    @keyframes slogan-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.14); }
    }

    .eskon-blue { color: #00eaff; }
    .green      { color: #00ff9d; }
    .orange     { color: #ffaa00; }
    .purple     { color: #c084fc; }
    .darkred    { color: #e63946; }
    .eskon-white { color: white; }

    .qr-box {
      max-width: 320px;
      margin: -40px auto 80px;
      padding: 25px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
      color: #0d1b2a;
    }

    .qr-box .title, .qr-box .subtitle {
      font-weight: 600;
      animation: heartbeat-text 1.8s ease-in-out infinite alternate;
    }

    @keyframes heartbeat-text {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .qr-box img {
      width: 220px;
      border-radius: 8px;
    }

    /* 🔥 ANA SAYFAYA DÖN BUTONU */
    .home-btn-fixed {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #0077b6;
      color: white;
      font-size: 20px;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 50px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      z-index: 9999;
      transition: 0.3s;
      animation: floatBtn 2s ease-in-out infinite;
    }

    .home-btn-fixed:hover {
      background: #00b4d8;
      transform: scale(1.15);
    }

    @keyframes floatBtn {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .popup { display: none; position: fixed; inset: 0; background: rgba(13,27,42,0.92); z-index: 1000; }
    .popup.active { display: flex; }
  </style>
</head>
<body>

<div class="hero">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
       class="big-logo">

  <div class="hero-text">
    <h1>
      E S E R K
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
           class="inline-logo">
      N
    </h1>
  </div>
</div>

<div class="qr-box">
  <div class="title">📲 QR Kodu Tarat</div>
  <div class="subtitle">💼 Dijital Kartvizite Anında Ulaş</div>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://www.eserkon.com.tr/">
</div>

<!-- 🔥 BUTON -->
<a href="https://www.eserkon.com.tr/" class="home-btn-fixed">🏠 Ana Sayfa</a>

</body>
</html>
