<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON Katılım Formları</title>

  <!-- ✅ EKLEDİĞİM (SEO DÜZELTME) -->
  <meta name="description" content="ESERKON resmi web sitesi. Başvurular, duyurular ve iletişim bilgileri burada.">
  <link rel="canonical" href="https://www.eserkon.com.tr/">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }
    .hero img.big-logo {
      max-width: 240px;
      margin-bottom: 30px;
    }
    .hero img.inline-logo {
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }
    .hero-text h1 {
      font-size: 3.5rem;
      margin: 10px 0;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
      animation: eskon-heartbeat 1.6s ease-in-out infinite alternate;
    }
    .hero-text p {
      font-size: 1.4rem;
      letter-spacing: 2px;
      margin: 15px 0 40px;
      font-weight: 600;
      animation: slogan-pulse 3s ease-in-out infinite;
    }
    @keyframes eskon-heartbeat {
      from { transform: scale(1); text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #00c6ff, 0 0 80px #0095ff; }
      to   { transform: scale(1.18); text-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 80px #00c6ff, 0 0 140px #0095ff; }
    }
    @keyframes slogan-pulse {
      0%,100% { transform: scale(1); text-shadow: 0 0 12px rgba(255,255,255,0.6); }
      50% { transform: scale(1.14); text-shadow: 0 0 20px #00ff9d, 0 0 35px #ffdd00, 0 0 55px #ff6b6b, 0 0 70px #c084fc; }
    }
    .green { color: #00ff9d; }
    .orange { color: #ffaa00; }
    .purple { color: #c084fc; }
    .darkred { color: #e63946; }
    .eskon-white { color: white; }
    .qr-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin: -30px auto 80px;
    }
    .qr-box {
      max-width: 320px;
      padding: 25px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
      color: #0d1b2a;
    }
    .qr-box .title, .qr-box .subtitle {
      font-weight: 600;
      animation: heartbeat-text 1.8s ease-in-out infinite alternate;
    }
    .qr-box .title { font-size: 1.2rem; color: #0077b6; margin: 8px 0; }
    .qr-box .subtitle { font-size: 1rem; color: #1b263b; margin: 8px 0 20px; }
    @keyframes heartbeat-text {
      from { transform: scale(1); text-shadow: 0 0 8px rgba(0,0,0,0.2),0 0 12px rgba(0,119,182,0.5);}
      to { transform: scale(1.08); text-shadow:0 0 10px rgba(0,0,0,0.3),0 0 20px rgba(0,119,182,0.8),0 0 30px rgba(0,119,182,0.6);}
    }
    .qr-box img { width: 220px; border-radius: 8px; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

    .popup { display: none; position: fixed; inset: 0; background: rgba(13,27,42,0.92); z-index: 1000; align-items: center; justify-content: center; }
    .popup.active { display: flex; }
    .popup-content { background: #1b263b; padding: 40px; border-radius: 16px; max-width: 500px; width: 100%; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);}
    .close-btn { position: absolute; top: 12px; right: 20px; font-size: 2.2rem; cursor: pointer; color: #aaa;}
    .close-btn:hover { color: white; }
    h2 { margin-bottom: 1.2rem; font-size: 1.8rem; }

    .events-section { max-width: 1000px; margin: 0 auto 100px; padding: 20px; }
    .event-card {
      background: #1b263b;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }
    .event-card:hover { transform: translateY(-5px); }
    .event-card h3 { font-size: 1.6rem; margin-bottom: 8px; color: #00eaff; }
    .event-card p { font-size: 1rem; margin-bottom: 12px; }
    .event-card button {
      background: #0077b6;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }
    .event-card button:hover { background: #00eaff; }

    @media (max-width:768px){
      .hero-text h1 { font-size: 2.5rem; }
      .hero-text p { font-size: 1.1rem; }
      .qr-box img { width: 180px; }
      .event-card h3 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<!-- ✅ EKLEDİĞİM (Google düzgün okusun diye) -->
<h1 style="display:none;">ESERKON</h1>
<p style="display:none;">ESERKON resmi başvuru ve bilgilendirme platformudur.</p>
