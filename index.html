 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON Dijital Kartvizit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }

    .hero img.big-logo {
      max-width: 220px;
      margin-bottom: 30px;
    }

    .hero img.inline-logo {
      width: 1.2em;
      height: 1.2em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }

    .hero-text h1 {
      font-size: 4.8rem;
      margin: 10px 0;
      font-weight: 700;
      animation: heartbeat 1.6s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
    }

    .hero-text p {
      font-size: 1.8rem;
      letter-spacing: 3px;
      margin: 20px 0 40px;
      font-weight: 600;
      animation: slogan-pulse 3s ease-in-out infinite;
    }

    @keyframes heartbeat {
      from {
        transform: scale(1);
        text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #00c6ff, 0 0 80px #0095ff;
      }
      to {
        transform: scale(1.18);
        text-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 80px #00c6ff, 0 0 140px #0095ff;
      }
    }

    @keyframes slogan-pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 12px rgba(255,255,255,0.6); }
      50% { transform: scale(1.14); text-shadow: 0 0 20px #00ff9d, 0 0 35px #ffdd00, 0 0 55px #ff6b6b, 0 0 70px #c084fc; }
    }

    .green   { color: #00ff9d; }
    .orange  { color: #ffaa00; }
    .purple  { color: #c084fc; }
    .darkred { color: #e63946; }
    .white   { color: white; }

    .qr-code {
      margin-top: 40px;
    }

    .qr-code img {
      width: 280px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,255,255,0.6);
    }
  </style>
</head>
<body>

<div class="hero">
  <!-- Yeni Logo -->
  <img src="LOGO_URL.png" alt="ESERKON Logo" class="big-logo">

  <div class="hero-text">
    <h1>
      <span>E S E R K</span>
      <img src="LOGO_URL.png" alt="ESERKON" class="inline-logo">
      <span>N</span>
    </h1>
    <p>
      <span class="green">EĞİTİM</span>
      <span class="orange">SOSYAL ETKİNLİK</span>
      <span class="darkred">VE</span>
      <span class="white">REHBERLİK</span>
      <span class="purple">KONSEYİ</span>
    </p>
  </div>

  <!-- QR Kod -->
  <div class="qr-code">
    <img src="QR_URL.png" alt="Dijital Kartvizit QR Kodu">
  </div>
</div>

</body>
</html>
