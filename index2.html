 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON Katılım Formları</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }

    .hero img.big-logo {
      max-width: 240px;
      margin-bottom: 30px;
    }

    .hero img.inline-logo {
      background: transparent !important;
      background-color: transparent !important;
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }

    .hero-text h1 {
      font-size: 5.5rem;
      margin: 10px 0;
      font-weight: 700;
      animation: eskon-heartbeat 1.6s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
    }

    .hero-text p {
      font-size: 1.9rem;
      letter-spacing: 3px;
      margin: 20px 0 60px;
      font-weight: 600;
      animation: slogan-pulse 3s ease-in-out infinite;
    }

    @keyframes eskon-heartbeat {
      from {
        transform: scale(1);
        text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #00c6ff, 0 0 80px #0095ff;
      }
      to {
        transform: scale(1.18);
        text-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 80px #00c6ff, 0 0 140px #0095ff;
      }
    }

    @keyframes slogan-pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 12px rgba(255,255,255,0.6); }
      50% { transform: scale(1.14); text-shadow: 0 0 20px #00ff9d, 0 0 35px #ffdd00, 0 0 55px #ff6b6b, 0 0 70px #c084fc; }
    }

    .eskon-blue { color: #00eaff; }
    .green      { color: #00ff9d; }
    .orange     { color: #ffaa00; }
    .purple     { color: #c084fc; }
    .darkred    { color: #e63946; }
    .eskon-white { color: white; }

    /* QR KARTI İÇİN KAPSAYICI */
    .qr-container {
      max-width: 1100px;
      margin: -60px auto 80px;
      padding: 0 20px;
      display: flex;
      justify-content: center;
    }

    /* QR KARTI */
    .qr-card {
      background: rgba(27, 38, 59, 0.8);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      text-align: center;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(192,132,252,0.3);
    }

    .qr-card .title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: #c084fc;
    }

    .qr-card .subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    .qr-card img {
      width: 200px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .qr-card .footer {
      font-size: 0.95rem;
      margin-top: 15px;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
         alt="ESERKON Logo" class="big-logo">

    <div class="hero-text">
      <h1>
        <span class="eserkon-white">E S E R K</span>
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
             alt="ESERKON" class="inline-logo">
        <span class="eskon-white">N</span>
      </h1>
      <p>
        <span class="green">EĞİTİM</span>
        <span class="orange">SOSYAL ETKİNLİK</span>
        <span class="darkred">VE</span>
        <span class="white">REHBERLİK</span>
        <span class="purple">KONSEYİ</span>
      </p>
    </div>
  </div>

  <!-- QR KARTI -->
  <div class="qr-container">
    <div class="qr-card">
      <div class="title">Dijital Kartvizit</div>
      <div class="subtitle">QR kodu tarat, anında ulaş!</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https%3A%2F%2Feskon-baskan-kartvizit.blogspot.com%2F" alt="QR Kod">
      <div class="footer">Hoşgeldiniz 🌟</div>
    </div>
  </div>

  <!-- Popup'lar (gizli) -->
  <div id="gonulluForm" class="popup"><div class="popup-content">
    <span class="close-btn">×</span>
    <h2>Gönüllü Öğretmen Başvuru</h2>
    <p>Buraya form gelecek</p>
  </div></div>

  <div id="ogrenciForm" class="popup"><div class="popup-content">
    <span class="close-btn">×</span>
    <h2>Öğrenci Üye Ol</h2>
    <p>Buraya form gelecek</p>
  </div></div>

  <div id="uyeForm" class="popup"><div class="popup-content">
    <span class="close-btn">×</span>
    <h2>Üye Ol</h2>
    <p>Buraya form gelecek</p>
  </div></div>

  <div id="destekForm" class="popup"><div class="popup-content">
    <span class="close-btn">×</span>
    <h2>Destek Ol</h2>
    <p>Buraya form gelecek</p>
  </div></div>

  <script>
    document.querySelectorAll('.fancy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-target');
        const popup = document.getElementById(target);
        if (popup) popup.classList.add('active');
      });
    });

    document.querySelectorAll('.close-btn, .popup').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.classList.contains('close-btn') || e.target.classList.contains('popup')) {
          document.querySelectorAll('.popup').forEach(p => p.classList.remove('active'));
        }
      });
    });
  </script>

</body>
</html>
