<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ESERKON — Şahin UYMAZ</title>
    <style>
        :root {
            --bg: #0a0f1c;
            --card: #0b1220;
            --accent: #0a66d1;
            --muted: #a0b0cc;
            --glow1: #22d3ee;
            --glow2: #6366f1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
            background: linear-gradient(180deg, #05070f 0%, #0a1222 70%);
            color: #e6eef6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 780px;
            background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.008));
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.75);
            padding: 32px 28px;
            position: relative;
            overflow: visible;
            border: 1px solid rgba(255,255,255,0.04);
        }

        /* Köşe animasyonları */
        .corner-anim {
            position: absolute;
            width: 180px;
            height: 180px;
            pointer-events: none;
            filter: blur(22px);
            opacity: 0.85;
            border-radius: 30px;
        }
        .corner-anim.c1 { left: -80px; top: -80px; background: radial-gradient(circle at 30% 30%, var(--glow1), transparent 45%); animation: blink1 2.8s linear infinite; }
        .corner-anim.c2 { right: -80px; bottom: -80px; background: radial-gradient(circle at 70% 70%, var(--glow2), transparent 45%); animation: blink2 3.4s linear infinite; }

        @keyframes blink1 { 0%,100% {opacity:0.07} 50% {opacity:0.38} }
        @keyframes blink2 { 0%,100% {opacity:0.06} 50% {opacity:0.32} }

        /* Header - Logo + Animasyonlu Başlık */
        .header {
            text-align: center;
            position: relative;
            z-index: 5;
            margin-bottom: 12px;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .main-logo {
            width: 100px;
  height: 100px;
  border-radius: 20px;
  object-fit: cover;
}
        .org-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1.4px;
            color: #ffffff;
            margin: 0 0 6px 0;
            text-shadow: 
                0 0 15px rgba(255,255,255,0.6),
                0 0 30px rgba(34, 211, 238, 0.7),
                0 0 50px rgba(99, 102, 241, 0.5);
            animation: titleNeon 2.3s ease-in-out infinite;
        }

        .role {
            font-size: 22.5px;
            font-weight: 600;
            color: #c8d4f0;
            margin: 0;
            text-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
            animation: roleNeon 2.8s ease-in-out infinite;
        }

        @keyframes titleNeon {
            0%, 100% { text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(34,211,238,0.7), 0 0 50px rgba(99,102,241,0.5); }
            50% { text-shadow: 0 0 25px rgba(255,255,255,0.9), 0 0 45px rgba(34,211,238,1), 0 0 70px rgba(99,102,241,0.8); }
        }

        @keyframes roleNeon {
            0%, 100% { text-shadow: 0 0 10px rgba(99,102,241,0.5); }
            50% { text-shadow: 0 0 18px rgba(99,102,241,0.9), 0 0 30px rgba(34,211,238,0.6); }
        }

        /* 9 Butonlar - Beyaz Yazı + Daha Büyük Logolar */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 30px;
            position: relative;
            z-index: 4;
        }

        .col { flex: 1 1 340px; min-width: 280px; }

        .link-box {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 15px 18px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .link-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(199,16,46,0.12), rgba(99,102,241,0.08), rgba(34,211,238,0.12));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-box:hover::before { opacity: 1; }

        .link-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(199,16,46,0.18), 0 0 25px rgba(99,102,241,0.25);
            border-color: rgba(255,255,255,0.15);
        }

        /* Küçük logoları büyüttük (52px → 58px) */
        .badge {
            width: 65px;
            height: 65px;
            border-radius: 20px;
            background: linear-gradient(135deg, #1e2a4a, #0f1b38);
            box-shadow: 0 5px 18px rgba(0,0,0,0.35), 
                        inset 0 3px 10px rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: badgePulse 3.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes badgePulse {
            0%,100% { box-shadow: 0 5px 18px rgba(200,16,46,0.35), inset 0 3px 10px rgba(255,255,255,0.12); }
            50% { box-shadow: 0 7px 25px rgba(200,16,46,0.6), inset 0 4px 14px rgba(255,255,255,0.3); }
        }

        .badge img {
            width: 52px;   /* Logo resmi de büyütüldü */
            height: 52px;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }

        /* Yazılar tamamen beyaz yapıldı */
        .meta {
            font-size: 15.5px;
            color: #ffffff;           /* Beyaz */
            position: relative;
            z-index: 2;
            line-height: 1.35;
        }

        .muted {
            color: #b0c0e0;           /* Hafif gri-beyaz ton (muted olarak kaldı ama daha parlak) */
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            display: block;
            letter-spacing: 0.3px;
        }

        .link-box a, .link-box span {
            color: #ffffff;           /* Tüm yazılar beyaz */
            text-decoration: none;
        }

        /* Alt Butonlar */
        .actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 32px;
            position: relative;
            z-index: 4;
        }

        .btn {
            padding: 14px 26px
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.6px;
            font-size: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn.save {
            background: linear-gradient(90deg, #10b981, #059669);
            color: #021226;
            box-shadow: 0 12px 35px rgba(16,185,129,0.35);
            animation: neonSave 2s ease-in-out infinite;
        }

        .btn.vcf {
            background: linear-gradient(90deg, #4f46e5, #6366f1);
            color: white;
            box-shadow: 0 12px 35px rgba(99,102,241,0.35);
            animation: neonVcf 2.4s ease-in-out infinite;
        }

        @keyframes neonSave {
            0%,100% { box-shadow: 0 12px 35px rgba(16,185,129,0.35), 0 0 20px #22d3ee; }
            50% { box-shadow: 0 12px 50px rgba(16,185,129,0.6), 0 0 35px #67e8f9; }
        }

        @keyframes neonVcf {
            0%,100% { box-shadow: 0 12px 35px rgba(99,102,241,0.35), 0 0 20px #a5b4fc; }
            50% { box-shadow: 0 12px 50px rgba(99,102,241,0.6), 0 0 35px #c4d0ff; }
        }

        .btn:hover { transform: translateY(-4px) scale(1.04); }

        .pulse-outline {
            position: absolute;
            inset: -8px;
            border-radius: 30px;
            padding: 8px;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(90deg, rgba(34,211,238,0.1), rgba(99,102,241,0.08));
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            animation: glow 4s infinite linear;
        }

        @keyframes glow {
            0%,100% { opacity: 0.55; filter: blur(8px); }
            50% { opacity: 1; filter: blur(16px); }
        }

        .note {
            text-align: center;
            color: var(--muted);
            font-size: 13.2px;
            margin-top: 18px;
            position: relative;
            z-index: 4;
        }

        @media (max-width: 540px) {
            .card { padding: 24px 18px; border-radius: 20px; }
            .org-title { font-size: 27px; }
            .main-logo { width: 78px; height: 78px; }
            .badge { width: 54px; height: 54px; }
            .badge img { width: 38px; height: 38px; }
        }
    </style>
</head>
