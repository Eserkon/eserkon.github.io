<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsorlarımız | ESERKON</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(to bottom, #eef3f9, #f8fafc);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
  padding: 50px 20px;
}

header h1 {
  margin: 0;
  font-size: 36px;
}

header p {
  margin-top: 10px;
  opacity: 0.9;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
}

/* GRID */
.sponsor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

/* CARD */
.sponsor-card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
  border-top: 4px solid #2a5298;
}

.sponsor-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

/* LOGO */
.sponsor-card img {
  max-width: 110px;
  margin-bottom: 15px;
}

/* TEXT */
.sponsor-card h3 {
  margin: 10px 0;
  color: #1e3c72;
}

.sponsor-card p {
  font-size: 14px;
  color: #555;
}

.promo {
  margin-top: 10px;
  font-style: italic;
  color: #27ae60;
}

/* BUTON */
.home-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, #00b4d8, #0077b6);
  color: white;
  padding: 12px 18px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 14px;
}

/* MOBİL */
@media (max-width: 768px) {
  header h1 {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<header>
  <h1>🌟 Sponsorlarımız</h1>
  <p>Gençlerimizin geleceğine birlikte yatırım yapıyoruz</p>
</header>

<div class="container">

  <div class="sponsor-grid">

    <div class="sponsor-card">
      <img src="https://via.placeholder.com/120x80?text=Firma+1">
      <h3>Firma 1</h3>
      <p>Eğitim Teknolojileri</p>
      <p class="promo">“Gençlerin eğitimine katkı sağlıyoruz”</p>
    </div>

    <div class="sponsor-card">
      <img src="https://via.placeholder.com/120x80?text=Firma+2">
      <h3>Firma 2</h3>
      <p>Gıda ve İçecek</p>
      <p class="promo">“Sağlıklı destek!”</p>
    </div>

    <div class="sponsor-card">
      <img src="https://via.placeholder.com/120x80?text=Firma+3">
      <h3>Firma 3</h3>
      <p>Yazılım & Teknoloji</p>
      <p class="promo">“Geleceğe yatırım”</p>
    </div>

    <div class="sponsor-card">
      <img src="https://via.placeholder.com/120x80?text=Firma+4">
      <h3>Firma 4</h3>
      <p>Spor & Sağlık</p>
      <p class="promo">“Gençler için destek”</p>
    </div>

  </div>

</div>

<a href="index.html" class="home-btn">🏠 Ana Sayfa</a>

</body>
</html>
